<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTK Path Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1 id="pageTitle">RTK Path Visualizer</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
    <button id="langToggle" class="lang-toggle" title="Switch to Chinese" aria-label="Switch language">◌</button>
  </header>

  <section class="toolbar">
    <label id="csvLabel">CSV Route File
      <input type="file" id="csvFile" accept=".csv,.txt" />
    </label>
    <label id="rtkSourceLabel">RTK Source
      <select id="rtkSourceSelect" disabled></select>
    </label>
    <button id="btnFindMe">Find Me</button>
    <button id="btnCenterCurrent">Center Current</button>
    <button id="btnEditRoute">Edit Route</button>
    <button id="btnUndoNode" disabled>Undo Node</button>
    <div id="editRouteOptions" class="edit-options" aria-hidden="true">
      <label>tol(m)
        <input type="number" id="editTolerance" min="0.1" step="0.1" value="0.5" />
      </label>
      <label>speed(m/s)
        <input type="number" id="editMaxSpeed" min="0" step="0.1" value="1.0" />
      </label>
    </div>
    <button id="btnStartSim">Start Simulation</button>
    <button id="btnExportRoute">Export Route CSV</button>
    <button id="btnClearTrack">Clear Track</button>
    <button id="btnExportLog">Export Log</button>
  </section>

  <main>
    <div id="map"></div>
    <aside>
      <div class="card">
        <h3 id="cardCurrentTitle">Current Position</h3>
        <div class="row"><span id="labelLat">Latitude</span><strong id="latVal">-</strong></div>
        <div class="row"><span id="labelLon">Longitude</span><strong id="lonVal">-</strong></div>
        <div class="row"><span id="labelSource">Source</span><strong id="srcVal">-</strong></div>
        <div class="row"><span>Fix</span><strong id="fixVal">-</strong></div>
        <div class="row"><span id="labelSats">Satellites</span><strong id="satVal">-</strong></div>
        <div class="row"><span>HDOP</span><strong id="hdopVal">-</strong></div>
        <div class="row"><span id="labelSpeed">Speed</span><strong id="spdVal">-</strong></div>
      </div>
      <div class="card">
        <h3 id="cardMissionTitle">Mission Progress</h3>
        <div class="row"><span id="labelReached">Reached Waypoints</span><strong id="reachVal">0 / 0</strong></div>
        <div class="row"><span id="labelTarget">Current Target</span><strong id="targetVal">-</strong></div>
        <div class="row"><span id="labelDistance">Target Distance</span><strong id="distVal">-</strong></div>
      </div>
      <div class="card">
        <h3 id="cardEventTitle">Events</h3>
        <ul id="eventList"></ul>
      </div>
    </aside>
  </main>

  <script>
    function loadCss(href) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.onload = () => resolve(href);
        link.onerror = () => reject(new Error(`CSS load failed: ${href}`));
        document.head.appendChild(link);
      });
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = false;
        script.onload = () => resolve(src);
        script.onerror = () => reject(new Error(`Script load failed: ${src}`));
        document.body.appendChild(script);
      });
    }

    async function loadFirst(candidates, loader) {
      let lastErr = null;
      for (const c of candidates) {
        try {
          return await loader(c);
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error('No candidates');
    }

    async function boot() {
      try {
        await loadFirst(
          [
            './assets/vendor/leaflet/leaflet.css'
          ],
          loadCss
        );
        await loadFirst(
          [
            './assets/vendor/leaflet/leaflet.js',
          ],
          loadScript
        );
        await loadScript('rtk_visualizer.js');
      } catch (err) {
        console.error(err);
        alert('Map component load failed: verify local Leaflet files or internet access.');
      }
    }

    boot();
  </script>
</body>
</html>
