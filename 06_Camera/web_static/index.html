<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>Camera Controller</h1>
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <div class="main-container">

    <!-- Video Display -->
    <div class="video-container">
      <div id="singleView" class="single-view">
        <img id="mjpegStream" class="mjpeg-img" alt="Camera stream" />
        <div class="video-overlay" id="videoOverlay">
          <div class="overlay-spinner" id="overlaySpinner"></div>
          <span id="videoOverlayText">Stream not active</span>
        </div>
      </div>

      <div id="dualView" class="dual-view hidden">
        <div class="dual-cam-card">
          <div class="dual-cam-title">Camera 1</div>
          <img id="mjpegStreamCam1" class="mjpeg-img" alt="Camera 1 stream" />
          <div class="video-overlay" id="videoOverlayCam1">
            <span>Camera 1 not active</span>
          </div>
        </div>
        <div class="dual-cam-card">
          <div class="dual-cam-title">Camera 2</div>
          <img id="mjpegStreamCam2" class="mjpeg-img" alt="Camera 2 stream" />
          <div class="video-overlay" id="videoOverlayCam2">
            <span>Camera 2 not active</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Control Panel -->
    <div id="data-panel">

      <!-- Camera Selection -->
      <div class="panel-section">
        <h3>Camera</h3>
        <div class="cam-select">
          <button class="cam-btn active" id="btnCam1" data-cam="1">Camera 1</button>
          <button class="cam-btn" id="btnCam2" data-cam="2">Camera 2</button>
        </div>
        <div class="cam-select view-mode">
          <button class="cam-btn active" id="btnViewSingle">Single</button>
          <button class="cam-btn" id="btnViewBoth">Both</button>
        </div>
      </div>

      <!-- Plugin -->
      <div class="panel-section">
        <h3>Plugin</h3>
        <select id="pluginSelect" class="control-select"></select>
        <div class="data-row">
          <span class="label">Active</span>
          <span class="value" id="activePlugin">—</span>
        </div>
        <div id="pluginConfigContainer"></div>
        <button class="btn btn-accent" id="btnApplyPlugin">Apply Plugin</button>
      </div>

      <!-- Snapshot -->
      <div class="panel-section">
        <h3>Snapshot</h3>
        <button class="btn btn-accent" id="btnSnapshot">Capture Frame</button>
        <div class="data-row" id="snapshotRow" style="display:none">
          <a class="value url-link" id="snapshotLink" href="#" target="_blank">Open snapshot</a>
        </div>
      </div>

      <!-- Stream Control -->
      <div class="panel-section">
        <h3>Stream</h3>
        <div class="data-row">
          <span class="label">Status</span>
          <span class="value" id="streamStatus">Stopped</span>
        </div>
        <div class="data-row">
          <span class="label">FPS</span>
          <span class="value" id="streamFps">0.0</span>
        </div>
        <div class="data-row">
          <span class="label">Resolution</span>
          <span class="value" id="streamRes">—</span>
        </div>
      </div>

      <!-- MJPEG URLs -->
      <div class="panel-section">
        <h3>MJPEG URLs</h3>
        <div class="data-row url-row">
          <span class="label">Cam 1</span>
          <a class="value url-link" id="mjpegUrl1" href="#" target="_blank">—</a>
        </div>
        <div class="data-row">
          <span class="label">Cam 1 Clients</span>
          <span class="value" id="cam1Clients">0</span>
        </div>
        <div class="button-group compact-group">
          <button class="btn-start" id="btnStartCam1">Start C1</button>
          <button class="btn-stop" id="btnStopCam1">Stop C1</button>
        </div>
        <div class="data-row url-row">
          <span class="label">Cam 2</span>
          <a class="value url-link" id="mjpegUrl2" href="#" target="_blank">—</a>
        </div>
        <div class="data-row">
          <span class="label">Cam 2 Clients</span>
          <span class="value" id="cam2Clients">0</span>
        </div>
        <div class="button-group compact-group">
          <button class="btn-start" id="btnStartCam2">Start C2</button>
          <button class="btn-stop" id="btnStopCam2">Stop C2</button>
        </div>
      </div>

    </div>

  </div>

  <script src="camera_visualizer.js"></script>

</body>
</html>
